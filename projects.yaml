# projects.yaml — target-project registry for project-maintainer
#
# Pattern borrowed from the second-brain's sister-projects.yaml:
# `~/` home-expansion paths (portable across machines) + remote fallback.
#
# Fields per project:
#   path:        local checkout (~/ expanded at runtime)
#   remote:      git remote (fallback / provenance)
#   docs:        list of documentation roots to audit/clean
#   wiki:        wiki root if present ("" = none yet)
#   brain:       brain implantation status: none | partial | implanted
#   writable:    whether mutating verbs may EVER touch it (audit always allowed)
#   language_policy: how the language-cleanup feature treats this project:
#                clean        -> flag slurs+vulgar; profanity fixer may redact
#                flag-only    -> flag slurs+vulgar; fixer refuses (DEFAULT / unknown)
#                preserve     -> vulgar is intentional; flag slurs only
#                preserve-all -> flag nothing (operator-verbatim / intentional corpus)
#   notes:       free-form

projects:

  sovereign-os:
    path: ~/sovereign-os
    remote: https://github.com/cyberpunk042/sovereign-os
    docs: [docs, backlog]
    wiki: ""
    brain: none
    writable: true
    language_policy: flag-only
    notes: "Rust workspace; docs/ has sdd, handoff, review, standing-directives"

  selfdef:
    path: ~/selfdef
    remote: https://github.com/cyberpunk042/selfdef
    docs: [docs, backlog, rules]
    wiki: ""
    brain: none
    writable: true
    language_policy: flag-only
    notes: "Rust + eBPF; docs/ has sdd, handoff, review, operator"

  root-ghostproxy:
    path: ~/root-ghostproxy
    remote: https://github.com/cyberpunk042/root-ghostproxy
    docs: [wiki]
    wiki: wiki
    brain: implanted
    writable: true
    language_policy: preserve
    notes: "Already carries a full brain + wiki; audit/upgrade territory, not implant. Its brain is packed with operator-verbatim strong language (sacrosanct); preserve vulgar, flag slurs only."

  the-virus-block-mc:
    path: ~/the-virus-block-mc
    remote: https://github.com/cyberpunk042/the-virus-block-mc
    docs: [docs, readme.md, INSTRUCTIONS.md, investigation_report.md, LICENSE-CLARIFICATION.md, config, src]
    wiki: ""
    brain: none
    writable: true
    language_policy: flag-only
    notes: "Java/Gradle Minecraft mod (shaders/rendering). Not an Obsidian vault — do NOT run fix --fixers wikilinks here. docs: list mixes dirs + top-level files (root readme.md was the biggest doc a docs/-only scan missed) — the tool now scans file-entries too. `.agent/` is deliberately EXCLUDED (agent scratch/working notes); add it if you want that cleaned. Unknown-intent target -> flag-only."

  second-brain:
    path: ~/devops-solutions-information-hub
    remote: https://github.com/cyberpunk042/devops-solutions-information-hub
    docs: [wiki]
    wiki: wiki
    brain: implanted
    writable: false
    language_policy: preserve
    notes: "READ-ONLY from project-maintainer (AGENTS.md Hard Rule 6). Audit allowed; never mutate. Operator-verbatim corpus is sacrosanct; preserve vulgar, flag slurs only."

  # --- Registered 2026-07-10 (Wave 0): the 5 live ecosystem repos previously invisible to the toolbelt. ---
  # doc roots below are REAL (verified on disk), not invented. brain=none = pm never stamped ITS brain here;
  # openarms/openfleet carry their OWN mature native brains — audit/upgrade territory, NOT implant.

  openarms:
    path: ~/openarms
    remote: https://github.com/cyberpunk042/openarms
    docs: [docs, wiki, README.md]
    wiki: wiki
    brain: none
    writable: true
    language_policy: preserve
    notes: "TS agent platform (fork of OpenClaw). Carries its own native brain (CLAUDE.md + .claude/ + wiki) — do NOT implant over it; audit/upgrade only. Its logs quote the operator verbatim incl. strong language (sacrosanct) -> preserve vulgar, flag slurs only."

  openfleet:
    path: ~/openfleet
    remote: https://github.com/cyberpunk042/openfleet
    docs: [docs, wiki, README.md]
    wiki: wiki
    brain: none
    writable: true
    language_policy: preserve
    notes: "Python fleet orchestrator + TS gateway. Own native brain (CLAUDE.md + .claude/ + wiki) — audit/upgrade, not implant. wiki/log carries operator-verbatim strong language (sacrosanct) -> preserve vulgar, flag slurs only. NOTE: its brain + tools/gateway.py + .mcp.json still reference the OLD repo name 'devops-solutions-research-wiki' (now 'devops-solutions-information-hub') across 43 files, all via /home/jfortin/ absolute paths — a repo-wide rename that needs operator confirmation of the real machine layout before any fix."

  devops-control-plane:
    path: ~/devops-control-plane
    remote: https://github.com/cyberpunk042/devops-control-plane
    docs: [docs, README.md, CHANGELOG.md]
    wiki: ""
    brain: none
    writable: true
    language_policy: flag-only
    notes: "Flask DevOps admin dashboard (44 blueprints). `.agent/` is agent scratch (plans/docs) — deliberately EXCLUDED from docs roots (mirror the-virus-block-mc convention). Unknown-intent -> flag-only."

  narrative-to-neutral-report-transformer:
    path: ~/Narrative-to-Neutral-Report-Transformer
    remote: https://github.com/cyberpunk042/Narrative-to-Neutral-Report-Transformer
    docs: [docs, README.md, LLM_VS_NLP_POSITIONING.md]
    wiki: ""
    brain: none
    writable: true
    language_policy: flag-only
    notes: "Python narrative->neutral-report NLP pipeline (v0.3). Dir is CamelCase on disk; github repo lower-cased. Unknown-intent -> flag-only."

  warp-solar-system-shaders:
    path: ~/warp-solar-system-shaders
    remote: https://github.com/cyberpunk042/warp-solar-system-shaders
    docs: [README.md]
    wiki: ""
    brain: none
    writable: true
    language_policy: flag-only
    notes: "Greenfield GLSL shader repo — currently only a 1-line README. Intended standalone home for the 92-file shader library living inside the-virus-block-mc. Unknown-intent -> flag-only."
