# projects.yaml — target-project registry for project-maintainer
#
# Pattern borrowed from the second-brain's sister-projects.yaml:
# `~/` home-expansion paths (portable across machines) + remote fallback.
#
# Fields per project:
#   path:        local checkout (~/ expanded at runtime)
#   remote:      git remote (fallback / provenance)
#   docs:        list of documentation roots to audit/clean
#   wiki:        wiki root if present ("" = none yet)
#   brain:       brain implantation status: none | partial | implanted
#   writable:    whether mutating verbs may EVER touch it (audit always allowed)
#   language_policy: how the language-cleanup feature treats this project:
#                clean        -> flag slurs+vulgar; profanity fixer may redact
#                flag-only    -> flag slurs+vulgar; fixer refuses (DEFAULT / unknown)
#                preserve     -> vulgar is intentional; flag slurs only
#                preserve-all -> flag nothing (operator-verbatim / intentional corpus)
#   notes:       free-form

projects:

  sovereign-os:
    path: ~/sovereign-os
    remote: https://github.com/cyberpunk042/sovereign-os
    docs: [docs, backlog]
    wiki: ""
    brain: none
    writable: true
    language_policy: flag-only
    backlog_root: backlog
    log_root: docs/standing-directives
    notes: "Rust workspace; docs/ has sdd, handoff, review, standing-directives. Already has a MATURE root backlog/ (epics/modules/features/milestones/requirements) + verbatim operator mandates in docs/standing-directives/ — brain must point at THOSE, not create wiki/backlog. Adoption guide: backlog/log paths are per-project."

  selfdef:
    path: ~/selfdef
    remote: https://github.com/cyberpunk042/selfdef
    docs: [docs, backlog, rules]
    wiki: ""
    brain: none
    writable: true
    language_policy: flag-only
    backlog_root: backlog
    log_root: docs/operator
    notes: "Rust + eBPF; docs/ has sdd, handoff, review, operator. Already has a root backlog/ (INDEX/SHIPPED/milestones) + date-prefixed operator directives in docs/operator/ — brain points at THOSE, not wiki/backlog. Adoption guide: backlog/log paths are per-project."

  root-ghostproxy:
    path: ~/root-ghostproxy
    remote: https://github.com/cyberpunk042/root-ghostproxy
    docs: [wiki]
    wiki: wiki
    brain: implanted
    writable: true
    language_policy: preserve
    notes: "Already carries a full brain + wiki; audit/upgrade territory, not implant. Its brain is packed with operator-verbatim strong language (sacrosanct); preserve vulgar, flag slurs only."

  the-virus-block-mc:
    path: ~/the-virus-block-mc
    remote: https://github.com/cyberpunk042/the-virus-block-mc
    docs: [docs, readme.md, INSTRUCTIONS.md, investigation_report.md, LICENSE-CLARIFICATION.md, config, src]
    wiki: ""
    brain: none
    writable: true
    language_policy: flag-only
    notes: "Java/Gradle Minecraft mod (shaders/rendering). Not an Obsidian vault — do NOT run fix --fixers wikilinks here. docs: list mixes dirs + top-level files (root readme.md was the biggest doc a docs/-only scan missed) — the tool now scans file-entries too. `.agent/` is deliberately EXCLUDED (agent scratch/working notes); add it if you want that cleaned. Unknown-intent target -> flag-only."

  nnrt:
    path: ~/Narrative-to-Neutral-Report-Transformer
    remote: https://github.com/cyberpunk042/Narrative-to-Neutral-Report-Transformer
    docs: [docs, README.md, CONTRIBUTING.md, LLM_VS_NLP_POSITIONING.md]
    wiki: ""
    brain: none
    writable: true
    language_policy: flag-only
    notes: "Python project (narrative -> neutral report transformer). It DETECTS AND NEUTRALIZES loaded language, so its docs/specs carry loaded/vulgar/slur terms as DATA (dictionaries, examples, test corpora) — expect language findings that are legitimate content, not drift. Unknown-intent target -> flag-only (operator's canonical 'do not assume a project you dont know has intentional mean words' example). docs: dir + top-level prose docs. EXCLUDED: .agent/ + .gemini/ (agent scratch), LICENSE.md (legal boilerplate), data/ (test corpora)."

  second-brain:
    path: ~/devops-solutions-information-hub
    remote: https://github.com/cyberpunk042/devops-solutions-information-hub
    docs: [wiki]
    wiki: wiki
    brain: implanted
    writable: false
    language_policy: preserve
    notes: "READ-ONLY from project-maintainer (AGENTS.md Hard Rule 6). Audit allowed; never mutate. Operator-verbatim corpus is sacrosanct; preserve vulgar, flag slurs only."
